services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: ${PG_DB_NAME}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER} -d ${PG_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - quant_net

  cache:
    image: redis:7-alpine
    restart: always
    environment:
      REDIS_APPENDONLY: ${REDIS_APPENDONLY:-yes}
      REDIS_SAVE: ${REDIS_SAVE:-60 1000}
      REDIS_MAXMEMORY_POLICY: ${REDIS_MAXMEMORY_POLICY:-allkeys-lru}
    command:
      - sh
      - -c
      - redis-server --appendonly "$$REDIS_APPENDONLY" --save "$$REDIS_SAVE" --maxmemory-policy "$$REDIS_MAXMEMORY_POLICY"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - quant_net

  quant_core:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    volumes:
      - vntrader_data:/app/.vntrader
      - reports_data:/app/reports
    command: ["vntdr", "live"]
    healthcheck:
      test: ["CMD", "vntdr", "doctor"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - quant_net

networks:
  quant_net:
    driver: bridge

volumes:
  pg_data:
  redis_data:
  vntrader_data:
  reports_data:
