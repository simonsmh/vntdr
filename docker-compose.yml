services:
  db:
    image: postgres:18
    restart: always
    environment:
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: ${PG_DB_NAME}
    volumes:
      - pg_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER} -d ${PG_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - quant_net

  cache:
    image: redis:latest
    restart: always
    environment:
      REDIS_APPENDONLY: ${REDIS_APPENDONLY:-yes}
      REDIS_SAVE: ${REDIS_SAVE:-60 1000}
      REDIS_MAXMEMORY_POLICY: ${REDIS_MAXMEMORY_POLICY:-allkeys-lru}
    command:
      - sh
      - -c
      - redis-server --appendonly "$$REDIS_APPENDONLY" --save "$$REDIS_SAVE" --maxmemory-policy "$$REDIS_MAXMEMORY_POLICY"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - quant_net

  quant_core:
    image: ghcr.io/simonsmh/vntdr:latest
    restart: always
    environment:
      OKX_API_KEY: ${OKX_API_KEY:-}
      OKX_SECRET_KEY: ${OKX_SECRET_KEY:-}
      OKX_PASSPHRASE: ${OKX_PASSPHRASE:-}
      OKX_REST_BASE_URL: ${OKX_REST_BASE_URL:-https://www.okx.com}
      OKX_DEMO_TRADING: ${OKX_DEMO_TRADING:-true}
      PG_HOST: ${PG_HOST:-db}
      PG_PORT: ${PG_PORT:-5432}
      PG_USER: ${PG_USER:-vntdr}
      PG_PASSWORD: ${PG_PASSWORD:-changeme}
      PG_DB_NAME: ${PG_DB_NAME:-vntdr}
      REDIS_HOST: ${REDIS_HOST:-cache}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_DB: ${REDIS_DB:-0}
      REDIS_APPENDONLY: ${REDIS_APPENDONLY:-yes}
      REDIS_SAVE: ${REDIS_SAVE:-60 1000}
      REDIS_MAXMEMORY_POLICY: ${REDIS_MAXMEMORY_POLICY:-allkeys-lru}
      TG_BOT_TOKEN: ${TG_BOT_TOKEN:-}
      TG_CHAT_ID: ${TG_CHAT_ID:-}
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    volumes:
      - vntrader_data:/app/.vntrader
      - reports_data:/app/reports
      - config_data:/root/.vntdr
    command: ["vntdr", "live"]
    healthcheck:
      test: ["CMD", "vntdr", "doctor"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - quant_net

  webapp:
    image: ghcr.io/simonsmh/vntdr:latest
    restart: always
    environment:
      OKX_API_KEY: ${OKX_API_KEY:-}
      OKX_SECRET_KEY: ${OKX_SECRET_KEY:-}
      OKX_PASSPHRASE: ${OKX_PASSPHRASE:-}
      OKX_REST_BASE_URL: ${OKX_REST_BASE_URL:-https://www.okx.com}
      OKX_DEMO_TRADING: ${OKX_DEMO_TRADING:-true}
      PG_HOST: ${PG_HOST:-db}
      PG_PORT: ${PG_PORT:-5432}
      PG_USER: ${PG_USER:-vntdr}
      PG_PASSWORD: ${PG_PASSWORD:-changeme}
      PG_DB_NAME: ${PG_DB_NAME:-vntdr}
      REDIS_HOST: ${REDIS_HOST:-cache}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_DB: ${REDIS_DB:-0}
      REDIS_APPENDONLY: ${REDIS_APPENDONLY:-yes}
      REDIS_SAVE: ${REDIS_SAVE:-60 1000}
      REDIS_MAXMEMORY_POLICY: ${REDIS_MAXMEMORY_POLICY:-allkeys-lru}
      TG_BOT_TOKEN: ${TG_BOT_TOKEN:-}
      TG_CHAT_ID: ${TG_CHAT_ID:-}
      GRADIO_PORT: ${GRADIO_CONTAINER_PORT:-7860}
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    ports:
      - "${GRADIO_PORT:-7860}:${GRADIO_CONTAINER_PORT:-7860}"
    command: ["vntdr", "gradio", "--port", "${GRADIO_CONTAINER_PORT:-7860}"]
    volumes:
      - config_data:/root/.vntdr
    networks:
      - quant_net

networks:
  quant_net:
    driver: bridge

volumes:
  pg_data:
  redis_data:
  vntrader_data:
  reports_data:
  config_data:
