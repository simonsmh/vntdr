services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: ${PG_DB_NAME}
    volumes:
      - ./data/pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER} -d ${PG_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - quant_net

  cache:
    image: redis:7-alpine
    restart: always
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - ./data/redis_data:/data
      - ./docker/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - quant_net

  quant_core:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    volumes:
      - ./.vntrader:/app/.vntrader
      - ./reports:/app/reports
      - /etc/localtime:/etc/localtime:ro
    command: ["vntdr", "live"]
    healthcheck:
      test: ["CMD", "vntdr", "doctor"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - quant_net

networks:
  quant_net:
    driver: bridge
